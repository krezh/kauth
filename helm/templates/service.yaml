apiVersion: v1
kind: Service
metadata:
  name: {{ include "kauth.fullname" . }}
  labels:
    {{- include "kauth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.clusterIP }}
  clusterIP: {{ . }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.webhook.enabled }}
    - port: {{ .Values.webhook.port }}
      targetPort: webhook
      protocol: TCP
      name: webhook
    {{- end }}
  selector:
    {{- include "kauth.selectorLabels" . | nindent 4 }}
