apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: oauthsessions.kauth.io
spec:
  group: kauth.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sessionID
                - verifier
              properties:
                sessionID:
                  type: string
                  description: Unique identifier for this session
                verifier:
                  type: string
                  description: PKCE verifier for code exchange
                userID:
                  type: string
                  description: User identifier (email or sub)
                createdAt:
                  type: string
                  format: date-time
                  description: Timestamp when session was created
                lastUsed:
                  type: string
                  format: date-time
                  description: Timestamp when session was last used for token refresh
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Lifecycle phase of the session (Pending, Active, Revoked, Expired)
                  enum:
                    - Pending
                    - Active
                    - Revoked
                    - Expired
                email:
                  type: string
                  description: Authenticated user's email address
                username:
                  type: string
                  description: Authenticated user's preferred username
                refreshToken:
                  type: string
                  description: Encrypted JWT refresh token for token rotation
                revokedAt:
                  type: string
                  format: date-time
                  description: Timestamp when the session was revoked
                error:
                  type: string
                  description: Error message if OAuth flow failed
                completedAt:
                  type: string
                  format: date-time
                  description: Timestamp when OAuth flow completed
                groups:
                  type: array
                  description: User's group memberships from OIDC at login time
                  items:
                    type: string
                webhookToken:
                  type: string
                  description: Encrypted webhook credential for Kubernetes exec plugin
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: User
          type: string
          jsonPath: .status.username
        - name: Email
          type: string
          jsonPath: .status.email
        - name: Last Used
          type: date
          jsonPath: .spec.lastUsed
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
        - name: Session ID
          type: string
          jsonPath: .spec.sessionID
          priority: 1
  scope: Namespaced
  names:
    plural: oauthsessions
    singular: oauthsession
    kind: OAuthSession
    shortNames:
      - oas
