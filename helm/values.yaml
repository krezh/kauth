# Number of kauth-server replicas
# For HA, run at least 3 replicas across different zones
replicaCount: 3

# Container image configuration
image:
  repository: ghcr.io/krezh/kauth-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

# ServiceAccount configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use (auto-generated if not set and create is true)
  name: ""

# Annotations to add to pods
podAnnotations: {}

# Labels to add to pods
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

httpRoute:
  enabled: false
  parentRefs:
    - name: gateway
      namespace: gateway-system
  hostnames:
    - kauth.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 1
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 2

# Node selector for pod assignment
# Example: { disktype: ssd }
nodeSelector: {}

# Affinity rules for pod scheduling
# Example:
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#     - labelSelector:
#         matchExpressions:
#         - key: app.kubernetes.io/name
#           operator: In
#           values:
#           - kauth
#       topologyKey: kubernetes.io/hostname
affinity: {}

# Topology spread constraints for multi-zone HA
# Spreads pods across zones and nodes for better availability
topologySpreadConstraints:
  # Spread across zones with max 1 pod difference
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: kauth-server
  # Spread across nodes with max 1 pod difference
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: kauth-server

# PodDisruptionBudget for HA
# Prevents all pods from being evicted during maintenance
podDisruptionBudget:
  enabled: true
  # minAvailable: 1  # Minimum pods that must be available
  maxUnavailable: 1 # Maximum pods that can be unavailable

# Additional environment variables
# Non-sensitive configuration values
env: []
  # - name: CLUSTER_NAME
  #   value: "production"
  # - name: BASE_URL
  #   value: "https://kauth.example.com"
  # - name: SESSION_TTL
  #   value: "15m"           # Session token lifetime (default: 15m)
  # - name: REFRESH_TOKEN_TTL
  #   value: "168h"          # Refresh token lifetime (default: 7 days)
  # - name: ALLOWED_ORIGINS
  #   value: "https://app1.example.com,https://app2.example.com"  # CORS origins (comma-separated)
  # - name: ALLOWED_GROUPS
  #   value: "admins,developers"  # Restrict access to specific OIDC groups (comma-separated)
  # - name: RATE_LIMIT_RPS
  #   value: "10"            # Requests per second per IP (default: 10)
  # - name: RATE_LIMIT_BURST
  #   value: "20"            # Burst capacity (default: 20)
  # - name: ROTATION_WINDOW
  #   value: "2"             # Refresh token rotation window (default: 2)

# Environment variables from ConfigMaps/Secrets
# Use for sensitive configuration
envFrom: []
  # - secretRef:
  #     name: kauth-secrets
  #
  # Required environment variables:
  #   OIDC_ISSUER_URL       - Your OIDC provider URL (e.g., https://auth.example.com)
  #   OIDC_CLIENT_ID        - OAuth2 client ID
  #   OIDC_CLIENT_SECRET    - OAuth2 client secret
  #   JWT_SIGNING_KEY       - Base64 encoded, 32+ bytes (openssl rand -base64 32)
  #   JWT_ENCRYPTION_KEY    - Base64 encoded, exactly 32 bytes
  #   KUBERNETES_API_URL    - Your K8s API server URL (e.g., https://k8s.example.com:6443)

rbac:
  create: true

# Prometheus monitoring configuration
monitoring:
  # Enable ServiceMonitor for Prometheus Operator
  enabled: false
  # How often to scrape metrics
  interval: 30s
  # Timeout for each scrape
  scrapeTimeout: 10s
  # Additional labels for ServiceMonitor (e.g., release: prometheus-stack)
  # Must match your Prometheus serviceMonitorSelector
  labels: {}
  # Relabeling rules for metrics
  relabelings: []

  # Grafana dashboard configuration (requires Grafana Operator)
  grafanaDashboard:
    # Enable GrafanaDashboard CRD creation
    enabled: false
    # Allow dashboard to be imported from other namespaces
    allowCrossNamespaceImport: true
    # Selector to match Grafana instance
    instanceSelector:
      matchLabels:
        grafana.internal/instance: grafana
    # Datasource mappings
    datasources:
      - datasourceName: prometheus
        inputName: DS_PROMETHEUS
    # Grafana folder to place dashboard in
    # folder: "Authentication"
    # Additional labels for GrafanaDashboard resource
    labels: {}
